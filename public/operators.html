<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キマル - 運営者管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/operator.css" />
</head>
<body class="operator-console" data-page="operators">
  <header class="site-header">
    <a class="brand" href="/cat-key-admin.html">キマル<span class="brand-tag">運営</span></a>
    <nav>
      <a href="/cat-key-admin.html">運営コンソール</a>
      <a href="/operators.html">運営者管理</a>
      <button id="operator-logout" class="link-button" type="button">ログアウト</button>
      <select class="lang-select" data-language-select aria-label="Language"></select>
    </nav>
  </header>

  <main class="shell narrow">
    <section class="panel">
      <p class="eyebrow">Operators</p>
      <h1>運営者管理</h1>
      <p class="lead">運営者アカウント（ユーザー=ownersとは別管理）の一覧・追加・削除を行います。パスワードは将来の運営者ごとログイン用で、現状の認証は共有管理キーです。</p>
      <form id="operator-add-form" class="form-grid">
        <label>メールアドレス<input name="email" type="email" autocomplete="off" required /></label>
        <label>名前<input name="name" autocomplete="off" /></label>
        <label>パスワード（任意・将来用）<input name="password" type="password" autocomplete="new-password" /></label>
        <button class="primary" type="submit">運営者を追加</button>
      </form>
      <p id="operator-message" class="message" role="status"></p>
    </section>

    <section class="panel">
      <p class="eyebrow">List</p>
      <h2>運営者一覧 <span id="operator-count" class="muted" style="font-size:14px;font-weight:600;"></span></h2>
      <div id="operator-list" class="list"></div>
    </section>
  </main>

  <!-- site-footer -->

  <script src="/i18n.js" defer></script>
  <script>
    const message = document.querySelector('#operator-message');
    const listEl = document.querySelector('#operator-list');
    const countEl = document.querySelector('#operator-count');

    function setMessage(text, kind = '') {
      message.textContent = text;
      message.className = `message ${kind}`.trim();
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[<>'"&]/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }

    function formatDate(value) {
      if (!value) return '';
      try {
        return new Intl.DateTimeFormat('ja-JP', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(value));
      } catch (_) { return value; }
    }

    async function api(options = {}) {
      const res = await fetch('/api/operators', {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (res.status === 401) { location.href = '/operator-login.html?next=/operators.html'; throw new Error('運営ログインが必要です。'); }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || '操作に失敗しました。');
      return data;
    }

    function render(operators) {
      const items = Array.isArray(operators) ? operators : [];
      countEl.textContent = `（${items.length} 名）`;
      if (!items.length) { listEl.innerHTML = '<p class="muted">運営者がいません。</p>'; return; }
      listEl.innerHTML = items.map((op) => `
        <article class="list-item">
          <strong>${escapeHtml(op.name || op.email)}</strong>
          <span>${escapeHtml(op.email)}</span>
          <p>状態: ${op.is_active ? '有効' : '無効'}</p>
          <small>登録: ${escapeHtml(formatDate(op.created_at))}</small>
          <div class="actions">
            <button class="button secondary" type="button" data-action="toggle" data-id="${escapeHtml(op.id)}" data-active="${op.is_active ? '0' : '1'}">${op.is_active ? '無効にする' : '有効にする'}</button>
            <button class="button secondary" type="button" data-action="delete" data-id="${escapeHtml(op.id)}">削除</button>
          </div>
        </article>`).join('');
    }

    async function load() {
      setMessage('読み込み中...');
      const data = await api();
      render(data.operators || []);
      setMessage('読み込みました。', 'success');
    }

    document.querySelector('#operator-add-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const payload = {
        action: 'create',
        email: form.elements.email.value.trim(),
        name: form.elements.name.value.trim(),
        password: form.elements.password.value,
      };
      setMessage('追加しています...');
      try {
        await api({ method: 'POST', body: JSON.stringify(payload) });
        form.reset();
        await load();
        setMessage('運営者を追加しました。', 'success');
      } catch (error) { setMessage(error.message, 'error'); }
    });

    listEl.addEventListener('click', async (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const action = button.dataset.action;
      const id = button.dataset.id;
      if (action === 'delete' && !confirm('この運営者を削除しますか？')) return;
      setMessage('更新中...');
      try {
        if (action === 'toggle') {
          await api({ method: 'POST', body: JSON.stringify({ action: 'toggle', id, is_active: button.dataset.active === '1' }) });
        } else if (action === 'delete') {
          await api({ method: 'POST', body: JSON.stringify({ action: 'delete', id }) });
        }
        await load();
        setMessage('更新しました。', 'success');
      } catch (error) { setMessage(error.message, 'error'); }
    });

    document.querySelector('#operator-logout').addEventListener('click', async () => {
      await fetch('/api/operator-login', { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'logout' }) }).catch(() => {});
      location.href = '/operator-login.html';
    });

    load().catch((error) => setMessage(error.message, 'error'));
  </script>
</body>
</html>
