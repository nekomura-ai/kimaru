<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kimaru - 管理</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="admin">
  <header class="site-header">
    <a class="brand" href="/">Kimaru</a>
    <nav>
      <a href="/booking.html">予約ページ</a>
      <a id="login-link" href="/api/google-auth-start">Google連携</a>
      <button id="logout-button" class="link-button" type="button">ログアウト</button>
    </nav>
  </header>

  <main class="shell admin-grid">
    <section class="panel">
      <p class="eyebrow">アカウント</p>
      <h1>キマル管理画面</h1>
      <p id="owner-status" class="message">ログイン状態を確認しています...</p>
      <div id="owner-card" class="soft-box"></div>
    </section>

    <section class="panel">
      <p class="eyebrow">猫の鍵 / Cat Key</p>
      <h2>招待コードで有料版を解放</h2>
      <p class="muted">猫の集会メンバーさんは、猫の鍵を入力すると有料版の機能を無料で利用できます。</p>
      <form id="invite-form" class="inline-form">
        <input name="code" placeholder="Neko20240222" />
        <button class="primary" type="submit">適用</button>
      </form>
      <p id="invite-message" class="message"></p>
    </section>

    <section class="panel wide">
      <p class="eyebrow">予約ページ設定</p>
      <h2>会う前から話しやすい予約ページを作る</h2>
      <form id="booking-page-form" class="form-grid">
        <label>ページタイトル<input name="title" value="Kimaru meeting" required /></label>
        <label>説明文<textarea name="description" rows="3" placeholder="どんな時間にしたいか、相手に伝えたいことを書きます。"></textarea></label>
        <label>予約時間
          <select name="duration_minutes">
            <option value="30">30分</option>
            <option value="45">45分</option>
            <option value="60">60分</option>
          </select>
        </label>
        <label>前バッファ
          <select name="buffer_before_minutes">
            <option value="0">なし</option>
            <option value="15">15分</option>
            <option value="30">30分</option>
          </select>
        </label>
        <label>後バッファ
          <select name="buffer_after_minutes">
            <option value="0">なし</option>
            <option value="15">15分</option>
            <option value="30">30分</option>
          </select>
        </label>
        <label>予約受付期間
          <select name="booking_range_months" id="booking-range-select">
            <option value="1">1ヶ月先まで</option>
            <option value="3" selected>3ヶ月先まで（無料版）</option>
            <option value="6">6ヶ月先まで（有料版）</option>
          </select>
        </label>
        <label>開催方法
          <select name="location_type" id="location-type-select">
            <option value="google_meet">Google Meet自動発行</option>
            <option value="in_person">対面</option>
            <option value="phone">電話</option>
            <option value="custom_url">カスタムURL</option>
            <option value="later">後で連絡</option>
            <option value="zoom" disabled>Zoom自動発行（将来対応）</option>
          </select>
        </label>
        <label id="location-value-field" class="hidden">開催場所・電話案内・URL<input name="location_value" placeholder="住所、電話案内、またはURL" /></label>
        <div class="questionnaire-box">
          <p class="eyebrow">事前アンケート</p>
          <p class="muted" id="question-limit-message">無料版は最大2問、有料版は最大5問まで設定できます。</p>
          <label class="question-row">質問1<input name="question_1" value="今回お話したい内容" /></label>
          <label class="question-row">質問2<input name="question_2" value="今、実現したい夢や目標は何ですか？" /></label>
          <label class="question-row pro-question">質問3<input name="question_3" value="最近挑戦していることはありますか？" /></label>
          <label class="question-row pro-question">質問4<input name="question_4" value="応援してほしいことはありますか？" /></label>
          <label class="question-row pro-question">質問5<input name="question_5" value="趣味や好きなことはありますか？" /></label>
        </div>
        <button class="primary" type="submit">予約ページを保存</button>
      </form>
      <p id="booking-page-message" class="message"></p>
    </section>

    <section class="panel wide">
      <p class="eyebrow">予約一覧</p>
      <h2>これから育つご縁</h2>
      <div id="booking-list" class="list"></div>
    </section>

    <section class="panel wide">
      <p class="eyebrow">面談メモ</p>
      <h2>会った後に、ご縁を育てる</h2>
      <form id="log-form" class="form-grid">
        <label>相手のメールアドレス<input name="visitor_email" type="email" required /></label>
        <label>キーワード<input name="keywords" placeholder="夢, 仕事, 紹介したい人" /></label>
        <label>メモ<textarea name="notes" rows="4" required></textarea></label>
        <label>次にできること<textarea name="next_action" rows="3"></textarea></label>
        <button class="primary" type="submit">メモを保存</button>
      </form>
      <p id="log-message" class="message"></p>
      <div id="log-list" class="list"></div>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
