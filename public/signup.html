<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キマル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="signup" data-i18n-title="signup.pageTitle">
  <!-- site-header -->

  <main class="shell narrow">
    <section class="panel">
      <p class="eyebrow" data-i18n="signup.eyebrow"></p>
      <h1 data-i18n="signup.heading"></h1>
      <p class="lead" data-i18n="signup.lead"></p>

      <a class="google-btn" href="/api/google-auth-start">
        <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2045c0-.6381-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7955 2.7164v2.2581h2.9087c1.7018-1.5668 2.6832-3.874 2.6832-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.4673-.806 5.9564-2.1818l-2.9087-2.2581c-.8059.54-1.8368.859-3.0477.859-2.344 0-4.3282-1.5831-5.036-3.7104H.9573v2.3318C2.4382 15.9832 5.4818 18 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.2823-1.1168-.2823-1.71s.1023-1.17.2823-1.71V4.9582H.9573C.3477 6.1732 0 7.5477 0 9s.3477 2.8268.9573 4.0418L3.964 10.71z"/>
          <path fill="#EA4335" d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.426 0 9 0 5.4818 0 2.4382 2.0168.9573 4.9582L3.964 7.29C4.6718 5.1627 6.656 3.5795 9 3.5795z"/>
        </svg>
        <span data-i18n="auth.googleSignup">Googleで無料登録</span>
      </a>
      <div class="auth-divider"><span data-i18n="auth.or">または</span></div>

      <form id="signup-form" class="form-grid">
        <label><span data-i18n="signup.name"></span><input name="name" autocomplete="name" required /></label>
        <label><span data-i18n="signup.email"></span><input name="email" type="email" autocomplete="email" required /></label>
        <label><span data-i18n="signup.purpose"></span><textarea name="purpose" rows="4" data-i18n-placeholder="signup.purposePlaceholder"></textarea></label>
        <label><span data-i18n="signup.language"></span><select name="language" data-language-select></select></label>
        <button class="primary" type="submit" data-i18n="signup.submit"></button>
      </form>
      <p id="signup-message" class="message" role="status"></p>
    </section>
  </main>


  <!-- site-footer -->

  <script src="/i18n.js" defer></script>
  <script src="/app.js" defer></script>
</body>
</html>
