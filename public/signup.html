<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キマル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="signup" data-i18n-title="signup.pageTitle">
  <header class="site-header">
    <a class="brand" href="/" data-i18n="common.brand">キマル</a>
    <nav>
      <a href="/booking.html" data-i18n="nav.booking">予約ページ</a>
      <a href="/booking-settings.html" data-i18n="nav.bookingSettings">予約設定</a>
      <a href="/admin.html" data-i18n="nav.admin">相手管理</a>
      <a href="/profile.html" data-i18n="nav.profile">プロフィール</a>
      <a href="/ai-assist.html" data-i18n="nav.aiAssist">AIアシスト</a>
      <a href="/pro.html" data-i18n="nav.pro">Pro版</a>
      <a href="/signup.html" data-i18n="nav.signup">無料登録</a>
      <select class="lang-select" data-language-select aria-label="Language"></select>
    </nav>
  </header>

  <main class="shell narrow">
    <section class="panel">
      <p class="eyebrow" data-i18n="signup.eyebrow"></p>
      <h1 data-i18n="signup.heading"></h1>
      <p class="lead" data-i18n="signup.lead"></p>

      <form id="signup-form" class="form-grid">
        <label><span data-i18n="signup.name"></span><input name="name" autocomplete="name" required /></label>
        <label><span data-i18n="signup.email"></span><input name="email" type="email" autocomplete="email" required /></label>
        <label><span data-i18n="signup.purpose"></span><textarea name="purpose" rows="4" data-i18n-placeholder="signup.purposePlaceholder"></textarea></label>
        <label><span data-i18n="signup.language"></span><select name="language" data-language-select></select></label>
        <button class="primary" type="submit" data-i18n="signup.submit"></button>
      </form>
      <p id="signup-message" class="message" role="status"></p>
    </section>
  </main>

  <script src="/i18n.js" defer></script>
  <script src="/app.js" defer></script>
</body>
</html>
