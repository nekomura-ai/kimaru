<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キマル - 運営コンソール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/operator.css" />
</head>
<body class="operator-console" data-page="cat-key-admin">
  <header class="site-header">
    <a class="brand" href="/cat-key-admin.html">キマル<span class="brand-tag">運営</span></a>
    <nav>
      <a href="/cat-key-admin.html">運営コンソール</a>
      <a href="/operators.html">運営者管理</a>
      <button id="operator-logout" class="link-button" type="button">ログアウト</button>
      <select class="lang-select" data-language-select aria-label="Language"></select>
    </nav>
  </header>

  <main class="shell narrow">
    <section class="panel">
      <p class="eyebrow">Admin / Cat Key</p>
      <h1>運営コンソール</h1>
      <p class="lead">Cat Keyの承認・却下や、不正利用時の無料プランへの降格（Cat Key欄の非表示）を行います。適用・失敗・停止のログも確認できます。</p>
      <p id="admin-message" class="message"></p>
    </section>

    <section class="panel">
      <p class="eyebrow">Owners</p>
      <h2>ユーザー一覧 <span id="owner-count" class="muted" style="font-size:14px;font-weight:600;"></span></h2>
      <label>検索<input id="owner-search" type="search" placeholder="名前・メール・プランで絞り込み" /></label>
      <div id="owner-admin-list" class="list" style="margin-top:12px;"></div>
    </section>

    <section class="panel">
      <p class="eyebrow">Audit Log</p>
      <h2>Cat Keyログ</h2>
      <div id="cat-key-event-list" class="list"></div>
    </section>
  </main>

  <!-- site-footer -->

  <script src="/i18n.js" defer></script>
  <script>
    const list = document.querySelector('#owner-admin-list');
    const eventList = document.querySelector('#cat-key-event-list');
    const message = document.querySelector('#admin-message');

    function setMessage(text, kind = '') {
      message.textContent = text;
      message.className = `message ${kind}`.trim();
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[<>'"&]/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }

    function formatDate(value) {
      if (!value) return '';
      try {
        return new Intl.DateTimeFormat('ja-JP', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(value));
      } catch (_) {
        return value;
      }
    }

    async function adminApi(options = {}) {
      const response = await fetch('/api/invite-apply?admin=cat-key', {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (response.status === 401) { location.href = '/operator-login.html?next=/cat-key-admin.html'; throw new Error('運営ログインが必要です。'); }
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || '管理者操作に失敗しました。');
      return data;
    }

    let allOwners = [];
    const ownerCount = document.querySelector('#owner-count');
    const ownerSearch = document.querySelector('#owner-search');

    function ownerCard(owner) {
      const plan = owner.plan === 'premium' ? 'プレミアム' : owner.plan === 'pro' ? 'Pro' : 'Free';
      const pendingBadge = owner.cat_key_pending ? ' / <strong style="color:var(--op-amber,#e0a83d);">承認待ち</strong>' : '';
      const approveButtons = owner.cat_key_pending ? `
            <button class="button primary" type="button" data-action="approve" data-owner-id="${escapeHtml(owner.id)}">承認してProにする</button>
            <button class="button secondary" type="button" data-action="reject" data-owner-id="${escapeHtml(owner.id)}">却下する</button>` : '';
      return `
        <article class="list-item">
          <strong>${escapeHtml(owner.name || owner.email || 'No name')}</strong>
          <span>${escapeHtml(owner.email || '')}</span>
          <p>プラン: ${plan} / Cat Key: ${escapeHtml(owner.invite_code || '-')} / 欄: ${owner.cat_key_disabled ? '非表示' : '表示中'}${pendingBadge}</p>
          <small>登録: ${escapeHtml(formatDate(owner.created_at))}</small>
          <div class="actions">${approveButtons}
            <button class="button secondary" type="button" data-action="revoke" data-owner-id="${escapeHtml(owner.id)}">無料に戻してCat Key欄を消す</button>
            <button class="button secondary" type="button" data-action="restore" data-owner-id="${escapeHtml(owner.id)}">Cat Key欄を再表示</button>
          </div>
        </article>`;
    }

    function applyOwnerFilter() {
      const query = (ownerSearch?.value || '').trim().toLowerCase();
      const filtered = query
        ? allOwners.filter((owner) => [owner.name, owner.email, owner.plan, owner.invite_code]
            .some((value) => String(value || '').toLowerCase().includes(query)))
        : allOwners;
      if (ownerCount) ownerCount.textContent = `（${filtered.length} / ${allOwners.length} 名）`;
      if (!filtered.length) {
        list.innerHTML = '<p class="muted">該当ユーザーがいません。</p>';
        return;
      }
      list.innerHTML = filtered.map(ownerCard).join('');
    }

    function renderOwners(owners) {
      allOwners = Array.isArray(owners) ? owners : [];
      applyOwnerFilter();
    }

    if (ownerSearch) ownerSearch.addEventListener('input', applyOwnerFilter);

    function renderEvents(events) {
      if (!events.length) {
        eventList.innerHTML = '<p class="muted">まだログはありません。</p>';
        return;
      }
      eventList.innerHTML = events.map((event) => `
        <article class="list-item">
          <strong>${escapeHtml(event.action || '')}</strong>
          <span>${escapeHtml(event.email || '')}</span>
          <p>Code: ${escapeHtml(event.code || '-')} / IP: ${escapeHtml(event.ip_address || '-')}</p>
          <small>${escapeHtml(formatDate(event.created_at))}</small>
        </article>
      `).join('');
    }

    async function loadOwners() {
      setMessage('読み込み中...');
      const data = await adminApi();
      renderOwners(data.owners || []);
      renderEvents(data.events || []);
      setMessage('読み込みました。', 'success');
    }

    list.addEventListener('click', async (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const action = button.dataset.action;
      const ownerId = button.dataset.ownerId;
      const confirmMap = {
        revoke: 'このユーザーを無料プランへ戻し、Cat Key欄を非表示にします。実行しますか？',
        restore: 'このユーザーのCat Key欄を再表示します。実行しますか？',
        approve: 'このユーザーのCat Key申請を承認し、Proを無料で解放します。実行しますか？',
        reject: 'このユーザーのCat Key申請を却下します。実行しますか？',
      };
      const confirmText = confirmMap[action] || '実行しますか？';
      if (!confirm(confirmText)) return;
      setMessage('更新中...');
      try {
        await adminApi({ method: 'POST', body: JSON.stringify({ action, owner_id: ownerId }) });
        await loadOwners();
        setMessage('更新しました。', 'success');
      } catch (error) {
        setMessage(error.message, 'error');
      }
    });

    document.querySelector('#operator-logout').addEventListener('click', async () => {
      await fetch('/api/operator-login', { method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'logout' }) }).catch(() => {});
      location.href = '/operator-login.html';
    });

    loadOwners().catch((error) => setMessage(error.message, 'error'));
  </script>
</body>
</html>
