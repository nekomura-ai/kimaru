<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キマル - Pro版申し込み</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">キマル</a>
    <nav>
      <a href="/booking.html">予約ページ</a>
      <a href="/pro.html">Pro版</a>
      <a href="/signup.html">無料登録</a>
      <a href="/admin.html">管理画面</a>
    </nav>
  </header>

  <main class="shell narrow">
    <section class="panel profile-card">
      <p class="eyebrow">Pro Application</p>
      <h1>Pro版に申し込む</h1>
      <p class="lead">まずは申し込み内容を送信してください。確認後、Pro版の利用開始方法を案内します。Cat Keyを持っている方は、管理画面から入力すると無料でPro機能を利用できます。</p>

      <form id="pro-apply-form" class="form-grid">
        <label>お名前<input name="name" autocomplete="name" required /></label>
        <label>メールアドレス<input name="email" type="email" autocomplete="email" required /></label>
        <label>会社名・屋号（任意）<input name="company" autocomplete="organization" /></label>
        <label>電話番号（任意）<input name="phone" type="tel" autocomplete="tel" /></label>
        <label>希望プラン
          <select name="plan">
            <option value="Pro版">Pro版</option>
            <option value="法人・チーム利用相談">法人・チーム利用相談</option>
            <option value="Cat Key利用">Cat Key利用</option>
          </select>
        </label>
        <label>猫の鍵 / Cat Key（お持ちの方のみ）<input name="invite_code" placeholder="Neko20240222" /></label>
        <label>利用目的<textarea name="use_case" rows="4" placeholder="例：営業面談、採用面談、顧客フォロー、コミュニティ運営など"></textarea></label>
        <label>相談したいこと<textarea name="message" rows="4" placeholder="導入時期、使いたい機能、確認したいことがあれば入力してください。"></textarea></label>
        <input type="hidden" name="language" value="ja" />
        <button class="primary" type="submit">申し込み内容を送信する</button>
      </form>
      <p id="pro-apply-message" class="message" role="status"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById('pro-apply-form');
    const message = document.getElementById('pro-apply-message');
    const setMessage = (text, kind = '') => {
      message.textContent = text;
      message.className = `message ${kind}`.trim();
    };
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      setMessage('申し込み内容を送信しています...');
      try {
        const response = await fetch('/api/pro-apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.fromEntries(new FormData(form).entries())),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || '送信に失敗しました。');
        form.reset();
        setMessage('申し込みを受け付けました。確認後、Pro版の利用開始方法を案内します。', 'success');
      } catch (error) {
        setMessage(error.message, 'error');
      }
    });
  </script>
</body>
</html>
