<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キマル - Pro版決済</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">キマル</a>
    <nav>
      <a href="/booking.html">予約ページ</a>
      <a href="/pro.html">Pro版</a>
      <a href="/pro-apply.html">Pro申し込み</a>
      <a href="/admin.html">管理画面</a>
    </nav>
  </header>

  <main class="shell narrow">
    <section class="panel profile-card">
      <p class="eyebrow">Square Checkout</p>
      <h1>Pro版の決済へ進む</h1>
      <p class="lead">Squareの決済ページで支払いを完了すると、確認後にPro版機能を有効化します。猫の鍵 / Cat Keyを持っている方は、決済せずに管理画面から入力してください。</p>
      <div class="actions">
        <a id="square-payment-link" class="button primary" href="/pro-apply.html">Square決済ページへ進む</a>
        <a class="button secondary" href="/pro-apply.html">先に申し込み内容を送る</a>
        <a class="button secondary" href="/admin.html">Cat Keyを入力する</a>
      </div>
      <p id="square-payment-note" class="message"></p>
    </section>
  </main>

  <script>
    const squarePaymentUrl = "";
    const link = document.getElementById('square-payment-link');
    const note = document.getElementById('square-payment-note');
    if (squarePaymentUrl) {
      link.href = squarePaymentUrl;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      note.textContent = 'Squareの外部決済ページを新しいタブで開きます。';
    } else {
      link.href = '/pro-apply.html';
      note.textContent = 'Square決済URLは未設定です。現在は申し込みフォームで受付します。Squareの決済URLが発行できたら、このページの squarePaymentUrl に差し込みます。';
    }
  </script>
</body>
</html>
