<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キマル - 予約</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/booking-redesign.css" />
</head>
<body data-page="booking" data-i18n-title="booking.pageTitle">
  <header class="site-header booking-header">
    <a class="brand" href="/" data-i18n="common.brand">キマル</a>
    <select class="lang-select" data-language-select aria-label="Language"></select>
  </header>

  <main class="shell two-column">
    <section class="panel profile-card" id="host-card">
      <p class="eyebrow" data-i18n="booking.intro.eyebrow">予約内容</p>
      <h1 id="host-title">日程を選んで予約</h1>
      <p class="lead" id="host-name"></p>
      <p class="muted" id="host-desc"></p>
      <ul class="feature-list" id="meeting-meta"></ul>
      <ul class="feature-list">
        <li data-i18n="booking.intro.li1">Googleカレンダーの予定と重ならない空き枠だけを表示</li>
        <li data-i18n="booking.intro.li2">1週間分の候補から都合のよい時間を選べます</li>
        <li data-i18n="booking.intro.li3">事前アンケートで、話したい内容を共有できます</li>
      </ul>
    </section>

    <section class="panel">
      <p class="eyebrow" data-i18n="booking.slots.eyebrow">予約できる時間</p>
      <h2 data-i18n="booking.slots.heading">1週間の空き枠から選ぶ</h2>
      <div id="week-nav" class="week-nav" style="display:none">
        <button type="button" id="prev-week" class="button secondary">← 前の週</button>
        <span id="week-label" class="muted"></span>
        <button type="button" id="next-week" class="button secondary">次の週 →</button>
      </div>
      <div id="slot-grid" class="slot-grid"></div>

      <form id="booking-form" class="form-grid hidden">
        <input type="hidden" name="owner_slug" value="demo" />
        <input type="hidden" name="start" />
        <input type="hidden" name="end" />
        <input type="hidden" name="filter_request" />
        <label><span data-i18n="booking.form.name">お名前</span><input name="visitor_name" autocomplete="name" required /></label>
        <label><span data-i18n="booking.form.email">メールアドレス</span><input name="visitor_email" type="email" autocomplete="email" required /></label>
        <div id="questionnaire-fields" class="wide" style="display:grid;gap:14px;"></div>
        <label><span data-i18n="booking.form.birth">生年月日（任意）</span><input name="birth_date" type="date" /></label>
        <label class="checkbox-label"><input name="birth_date_private" type="checkbox" value="yes" /><span data-i18n="booking.form.birthPrivate">生年月日を非公開にする</span></label>
        <button class="primary" type="submit" data-i18n="booking.form.submit">予約を確定する</button>
      </form>
      <p id="booking-message" class="message" role="status"></p>
    </section>
  </main>

  <section class="shell">
    <div class="panel cta-banner">
      <p class="eyebrow" data-i18n="booking.cta.eyebrow">キマルとは</p>
      <h2 data-i18n="booking.cta.heading">あなたも無料で予約ページを作れます</h2>
      <p class="muted" data-i18n="booking.cta.desc">キマルは無料で使える1on1の日程調整ツール。事前アンケート・面談メモ・プロフィール付きリマインドまで、会う前の準備をまるごとひとつに。</p>
      <a class="button primary" href="/signup.html" data-i18n="booking.cta.button">無料で予約ページを作る</a>
    </div>
  </section>

  <!-- site-footer -->

  <script src="/i18n.js" defer></script>
  <script src="/booking-week.js" defer></script>
</body>
</html>
