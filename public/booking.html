<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キマル - 予約</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="booking">
  <header class="site-header">
    <a class="brand" href="/">キマル</a>
    <nav>
      <a href="/booking.html">予約ページ</a>
      <a href="/admin.html">相手管理</a>
      <a href="/pro.html">Pro版</a>
      <a href="/pro-apply.html">Pro申し込み</a>
      <a href="/signup.html">無料登録</a>
    </nav>
  </header>

  <main class="shell two-column">
    <section class="panel profile-card">
      <p class="eyebrow">会う前の準備</p>
      <h1>日程がキマル。Pro版では契約がキマりやすく。</h1>
      <p class="lead">キマルは、日程調整と事前アンケートをひとつにした予約ツールで、打ち合わせの15分前にこちらのプロフィール付きのリマインドメールが相手に送られます。</p>
      <p class="lead">話したい内容や今の目標を先に確認できるので、打ち合わせをスムーズに進められます。</p>
      <ul class="feature-list">
        <li>受付できる曜日と時間帯から候補を表示</li>
        <li>事前アンケートで、話したい内容を確認</li>
      </ul>
    </section>

    <section class="panel">
      <p class="eyebrow">空き時間</p>
      <h2>日時を選ぶ</h2>
      <div id="slot-grid" class="slot-grid"></div>

      <form id="booking-form" class="form-grid hidden">
        <input type="hidden" name="owner_slug" value="demo" />
        <input type="hidden" name="start" />
        <input type="hidden" name="end" />
        <input type="hidden" name="filter_request" />
        <label>お名前<input name="visitor_name" autocomplete="name" required /></label>
        <label>メールアドレス<input name="visitor_email" type="email" autocomplete="email" required /></label>
        <label>今回お話したい内容<textarea name="topic" rows="4" required></textarea></label>
        <label>今、実現したい夢や目標は何ですか？<textarea name="goal" rows="3"></textarea></label>
        <label>生年月日（任意）<input name="birth_date" type="date" /></label>
        <label class="checkbox-label"><input name="birth_date_private" type="checkbox" value="yes" />生年月日を非公開にする</label>
        <button class="primary" type="submit">予約を確定する</button>
      </form>
      <p id="booking-message" class="message" role="status"></p>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
