<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kimaru - 予約</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="booking">
  <header class="site-header">
    <a class="brand" href="/">Kimaru</a>
    <nav>
      <a href="/signup.html">無料登録</a>
      <a href="/admin.html">管理画面</a>
    </nav>
  </header>

  <main class="shell two-column">
    <section class="panel profile-card">
      <p class="eyebrow">予約ページ</p>
      <h1>都合のよい日時を選択してください</h1>
      <p class="lead">候補日時から空いている時間を選び、必要事項を入力すると予約が完了します。事前に相談内容を共有しておくことで、当日のやりとりをスムーズに始められます。</p>
      <ul class="feature-list">
        <li>受付可能な曜日と時間帯に沿って候補を表示します</li>
        <li>予約内容は管理画面で確認できます</li>
        <li>オンライン、対面、電話などの開催方法に対応します</li>
      </ul>
    </section>

    <section class="panel">
      <p class="eyebrow">空き時間</p>
      <h2>日時を選ぶ</h2>
      <div id="slot-grid" class="slot-grid"></div>

      <form id="booking-form" class="form-grid hidden">
        <input type="hidden" name="owner_slug" value="demo" />
        <input type="hidden" name="start" />
        <input type="hidden" name="end" />
        <label>お名前<input name="visitor_name" autocomplete="name" required /></label>
        <label>メールアドレス<input name="visitor_email" type="email" autocomplete="email" required /></label>
        <label>今回相談したい内容<textarea name="topic" rows="4" required></textarea></label>
        <label>事前に共有しておきたいこと<textarea name="goal" rows="3"></textarea></label>
        <button class="primary" type="submit">予約を確定する</button>
      </form>
      <p id="booking-message" class="message" role="status"></p>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
