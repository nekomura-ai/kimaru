<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キマル - パスワード再設定</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- site-header -->

  <main class="shell narrow">
    <!-- 申請モード（トークンなし）: メールアドレスを入力して再設定リンクを送る -->
    <section class="panel" id="request-panel">
      <p class="eyebrow">Password reset</p>
      <h1>パスワード再設定</h1>
      <p class="lead">登録済みのメールアドレスを入力してください。再設定用のリンクをお送りします。</p>
      <form id="request-form" class="form-grid">
        <label>メールアドレス<input name="email" type="email" autocomplete="email" required /></label>
        <button class="primary" type="submit">再設定リンクを送る</button>
      </form>
      <p id="request-message" class="message" role="status"></p>
      <p class="form-note muted"><a href="/login.html">ログインに戻る</a></p>
    </section>

    <!-- 再設定モード（トークンあり）: 新しいパスワードを設定 -->
    <section class="panel hidden" id="reset-panel">
      <p class="eyebrow">Password reset</p>
      <h1>新しいパスワードを設定</h1>
      <p class="lead">新しいパスワード（8文字以上）を入力してください。</p>
      <form id="reset-form" class="form-grid">
        <label>新しいパスワード<input name="password" type="password" autocomplete="new-password" minlength="8" required /></label>
        <button class="primary" type="submit">パスワードを変更する</button>
      </form>
      <p id="reset-message" class="message" role="status"></p>
      <p class="form-note muted"><a href="/login.html">ログインに戻る</a></p>
    </section>
  </main>

  <!-- site-footer -->

  <script src="/i18n.js" defer></script>
  <script>
    const $ = (s) => document.querySelector(s);
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const ts = params.get("ts");
    const t = params.get("t");
    const resetMode = Boolean(id && ts && t);

    $("#request-panel").classList.toggle("hidden", resetMode);
    $("#reset-panel").classList.toggle("hidden", !resetMode);

    $("#request-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const email = new FormData(event.currentTarget).get("email");
      const msg = $("#request-message");
      msg.textContent = "送信しています...";
      msg.className = "message";
      try {
        await fetch("/api/password-reset-request", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        // 列挙対策のためサーバは常に成功を返す。メッセージも一律。
        msg.textContent = "ご登録のメールアドレス宛に再設定リンクをお送りしました（届かない場合は迷惑メールもご確認ください）。";
        msg.className = "message success";
      } catch (_) {
        msg.textContent = "ご登録のメールアドレス宛に再設定リンクをお送りしました。";
        msg.className = "message success";
      }
    });

    $("#reset-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = new FormData(event.currentTarget).get("password");
      const msg = $("#reset-message");
      msg.textContent = "変更しています...";
      msg.className = "message";
      try {
        const res = await fetch("/api/password-reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, ts, t, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "変更に失敗しました");
        msg.textContent = "パスワードを変更しました。ログインページに移動します...";
        msg.className = "message success";
        setTimeout(() => { location.href = "/login.html"; }, 1500);
      } catch (error) {
        msg.textContent = error.message;
        msg.className = "message error";
      }
    });
  </script>
</body>
</html>
