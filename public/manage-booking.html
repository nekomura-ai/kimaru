<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>キマル - 予約の確認・変更</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/booking-redesign.css" />
</head>
<body data-page="booking">
  <header class="site-header booking-header">
    <a class="brand" href="/" data-i18n="common.brand">キマル</a>
    <select class="lang-select" data-language-select aria-label="Language"></select>
  </header>

  <main class="shell narrow">
    <section class="panel">
      <p class="eyebrow">予約の確認・変更</p>
      <h1 id="manage-title">予約を読み込み中...</h1>
      <p class="muted" id="manage-sub"></p>
      <dl class="confirm-list" id="manage-summary"></dl>
      <div class="flow-actions" id="manage-actions" hidden>
        <button type="button" class="button secondary" id="btn-reschedule">日程を変更する</button>
        <button type="button" class="button danger" id="btn-cancel">予約をキャンセル</button>
      </div>
      <p id="manage-message" class="message" role="status"></p>
    </section>

    <!-- 日程変更 -->
    <section class="panel" id="reschedule-card" hidden>
      <p class="eyebrow">日程変更</p>
      <h2>新しい日時を選ぶ</h2>
      <p class="muted">変更後の空き枠から選んでください。確定すると元の日程は解放されます。</p>
      <div id="rs-week-nav" class="week-nav" style="display:none">
        <button type="button" id="rs-prev" class="button secondary">← 前の週</button>
        <span id="rs-week-label" class="muted"></span>
        <button type="button" id="rs-next" class="button secondary">次の週 →</button>
      </div>
      <div id="rs-slots" class="rs-slots"></div>
      <div class="flow-actions">
        <button type="button" class="button secondary" id="rs-back">← 戻る</button>
      </div>
      <p id="rs-message" class="message"></p>
    </section>
  </main>

  <!-- site-footer -->

  <script src="/i18n.js" defer></script>
  <script src="/manage-booking.js" defer></script>
</body>
</html>
