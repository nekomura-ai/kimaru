[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # nodemailer は動的requireを含むためバンドルせず node_module として同梱（Gmail SMTP送信用）
  external_node_modules = ["nodemailer"]

# 定期実行ジョブ（Netlify Scheduled Functions, cron はUTC）
[functions."reminder-scheduled"]
  schedule = "*/5 * * * *"   # 約5分間隔（予約22分前リマインダー）

[functions."thankyou-scheduled"]
  schedule = "0 1 * * *"     # 毎日 UTC01:00 = JST10:00（前日面談の未登録者へサンキュー＋登録案内・#181）

# 誕生日メールの自動送信は廃止（決定17・#180）。生年月日入力と占いベース相手分析は継続。

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/b/*"
  to = "/booking.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
